# The S3/MinIO connection secret. Maps onto the "mc alias set" mental model:
# alias + endpoint + access/secret keys, plus TLS trust (CA bundle OR the
# ignore-insecure toggle — set one, not both). Consumed by the Deployment via
# envFrom, so each key becomes an S3_* env var the publisher reads.
#
# Create it however you already manage secrets (ESO / Kyverno / SOPS / kubectl).
apiVersion: v1
kind: Secret
metadata:
  name: minio-homerun
  namespace: machinery-catalog-publisher
type: Opaque
stringData:
  S3_ALIAS: homerun
  S3_ENDPOINT: https://minio.sthings.lab
  S3_REGION: us-east-1            # MinIO ignores it; the AWS SDK requires one
  S3_ACCESS_KEY: REPLACE_ME
  S3_SECRET_KEY: REPLACE_ME
  # TLS trust — pick ONE:
  # S3_CA_BUNDLE: |               # inline PEM (pubca)
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----
  S3_INSECURE_SKIP_VERIFY: "false"
