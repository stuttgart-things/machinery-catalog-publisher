---
# Semantic-release driven release, mirroring stuttgart-things/clusterbook.
# Triggers after the build workflow succeeds on main (or via manual dispatch).
# call-go-release runs semantic-release to compute + tag the next version,
# then publishes:
#   - GoReleaser binaries attached to the GitHub release
#   - a versioned container image  ghcr.io/<repo>:<version>            (ko)
#   - a KCL kustomize OCI artifact ghcr.io/<repo>-kustomize:<version>  (dagger)
name: Release
on:
  workflow_run:
    workflows: ["Build, Push & Scan Container Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-go-release.yaml@main
    with:
      runs-on: ubuntu-latest
      go-version: "1.26.0"
      stage-image: true
      # This repo's package main lives under cmd/server (not the repo root),
      # so ko must target it explicitly.
      build-path: ./cmd/server
      push-kustomize: true
      kcl-source-dir: kcl
      kcl-profile-file: tests/kcl-deploy-profile.yaml
      kustomize-oci-repo: ghcr.io/stuttgart-things/machinery-catalog-publisher-kustomize
      # Pin the pushed kustomize base to the released image (ghcr.io/<repo>:<version>)
      # instead of the profile's :latest, which isn't published.
      kustomize-image-key: config.image
    secrets: inherit # pragma: allowlist secret
