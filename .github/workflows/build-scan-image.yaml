---
name: Build, Push & Scan Container Image
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: vet + test
        run: |
          go vet ./...
          go test ./...

  build-pr:
    needs: test
    if: github.event_name == 'pull_request'
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-ko-build.yaml@main
    with:
      runs-on: ubuntu-latest
      registry: ghcr.io
      build-path: ./cmd/server
      tags: pr-${{ github.event.number }}-${{ github.event.pull_request.head.sha }},pr-${{ github.event.number }}
    secrets: inherit # pragma: allowlist secret

  build-main:
    needs: test
    if: github.event_name != 'pull_request'
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-ko-build.yaml@main
    with:
      runs-on: ubuntu-latest
      build-path: ./cmd/server
    secrets: inherit # pragma: allowlist secret
