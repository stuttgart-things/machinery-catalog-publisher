defaultBaseImage: cgr.dev/chainguard/static:latest
builds:
  - id: machinery-catalog-publisher
    # The publisher's package main lives under cmd/server.
    main: ./cmd/server
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      # cmd/server/main.go declares main.version/commit/date, so these stick.
      - -X main.version={{ if index .Env "VERSION" }}{{.Env.VERSION}}{{ else }}dev{{ end }}
      - -X main.commit={{ if index .Env "COMMIT" }}{{.Env.COMMIT}}{{ else }}unknown{{ end }}
      - -X main.date={{ if index .Env "DATE" }}{{.Env.DATE}}{{ else }}unknown{{ end }}
